name: Deploy thani.sh

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-thani-sh
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Bun
        run: |
          set -eux
          curl -fsSL -o /usr/local/bin/bun https://github.com/oven-sh/bun/releases/latest/download/bun-linux-x64
          chmod +x /usr/local/bin/bun
          bun --version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build thani.sh
        run: bun run build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thani-sh-build
          path: .svelte-kit/cloudflare
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: Deploy to Cloudflare
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: https://thani.sh
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: thani-sh-build
          path: .svelte-kit/cloudflare
      - name: Deploy thani.sh
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .svelte-kit/cloudflare --project-name=thani-sh --commit-dirty=true